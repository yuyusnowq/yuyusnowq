<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇隅雪Q餅 - 專屬集點卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFDD0; color: #3D2B1F; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        .card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .btn-deep-pink { background-color: #E75480; transition: 0.3s; }
        .btn-deep-pink:hover { background-color: #C2466B; transform: translateY(-2px); }
        .animate-bounce { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; }
        .list-item { display: flex; align-items: flex-start; gap: 8px; }
        .list-num { color: #E75480; font-weight: 800; min-width: 18px; }
        .btn-line { background-color: #06C755; color: white; transition: 0.3s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="card w-full max-w-sm p-7 text-center border border-pink-50 relative">
        <h1 class="text-3xl font-bold tracking-wider">宇隅雪Q餅</h1>
        <p class="text-sm text-pink-400 font-medium tracking-[0.3em] mt-1 mb-6 ml-1">集點卡</p>

        <div id="login-section">
            <p class="text-sm text-gray-500 mb-6 leading-relaxed">輸入手機號碼<br>開啟您的集點之旅</p>
            <input type="tel" id="phone" placeholder="0912345678" class="w-full p-4 border-2 border-pink-50 rounded-2xl mb-4 text-center text-xl focus:border-pink-200 focus:outline-none">
            <button onclick="handleLogin()" class="btn-deep-pink w-full py-4 text-white font-bold text-lg rounded-2xl shadow-lg">進入集點卡</button>
        </div>

        <div id="loyalty-section" class="hidden">
            <p class="text-[10px] text-gray-400 mb-2">手機帳號：<span id="display-phone" class="font-bold"></span></p>
            <div class="relative w-40 h-40 mx-auto mb-5 flex items-center justify-center border-8 border-pink-50 rounded-full">
                <div class="text-center">
                    <span id="points-display" class="text-6xl font-black text-pink-400">0</span>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">Points</p>
                </div>
            </div>
            <p id="msg" class="text-sm font-medium text-gray-600 px-4 py-2 bg-pink-50 rounded-full inline-block mb-4">歡迎回來！</p>
            
            <div id="line-bonus-area" class="hidden mt-1 mb-4">
                <a id="line-link" href="#" target="_blank" class="btn-line w-full py-4 px-4 rounded-2xl font-bold flex items-center justify-center shadow-md">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="w-5 h-5 mr-2">
                    <span>🎁 加 LINE 領加碼點數！</span>
                </a>
                <p class="text-[9px] text-gray-400 mt-2 font-medium">
                    ※ 進入聊天室後按 <span class="text-pink-500 font-bold">「傳送」</span> 才算成功領取喔！
                </p>
            </div>

           <div id="manual-input-section" class="mt-4 pt-4 border-t border-gray-100">
    <p class="text-[10px] text-gray-400 mb-2 font-medium text-center">
        無法掃碼？請輸入小卡上的「集點序號」(共7碼)：
    </p>
    <div class="flex gap-2 w-full items-center">
        <input type="text" id="manual-code" placeholder="請輸入序號" 
               class="min-w-0 flex-1 p-3 border-2 border-pink-50 rounded-xl text-center text-sm focus:border-pink-200 outline-none uppercase">
        
        <button onclick="handleManualSubmit()" 
                class="flex-shrink-0 bg-pink-400 text-white px-4 py-3 rounded-xl font-bold text-sm shadow-sm active:scale-95">
            送出
        </button>
    </div>
</div>

            <div id="reward-btn" class="hidden mt-2 animate-bounce">
                <button onclick="openRedeemModal()" class="bg-yellow-400 w-full py-3 rounded-2xl text-white font-black shadow-xl border-b-4 border-yellow-600">🎁 點我領取贈品</button>
            </div>
        </div>

<div class="mt-10 pt-6 border-t border-gray-100">
            <div class="mb-4 space-y-1 text-center">
                <p class="text-[10px] text-pink-400 font-bold leading-tight">● 每集滿 10 點可兌換精選雪Q餅乙份 ●</p>
                <p class="text-[9px] text-pink-400 font-medium leading-tight opacity-80">(一個手機號碼限兌換一份)</p>
                
                <p class="text-[10px] text-pink-600 font-bold leading-tight pt-2">● 大包 1 點 / 小包 0.5 點 ●</p>
                <p class="text-[9px] text-pink-600 font-bold leading-tight">● 每包QR碼皆可累計，記得全部掃描喔 ●</p>
            </div>

           <div class="space-y-2 text-center mt-8 pb-4">
    <p class="text-[10px] text-gray-500 leading-tight font-medium">● 點數已與手機號碼綁定，換機登入不遺失 ●</p>
    <p class="text-[9px] text-gray-400 leading-tight">手機號碼僅供集點核對，宇隅絕不向外洩漏。</p>
</div>
        </div>
    </div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/dkdi92n4hjamk'; 
    const LINE_OA_ID = '@756qtkxr'; 

    // 重要：請確認您的分頁名稱是否正確
    const CODE_SHEET = 'valid_codes'; // 序號存放的分頁

    async function handleLogin() {
        const phone = document.getElementById('phone').value.trim();
        if(!phone || phone.length < 10) return alert('請輸入完整手機號碼');
        localStorage.setItem('yuyu_phone', phone);
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('loyalty-section').classList.remove('hidden');
        document.getElementById('display-phone').innerText = phone;
        await ensureUserExists(phone);
        setTimeout(() => { processCollection(phone); }, 1000); 
    }

    async function handleManualSubmit() {
        const codeInput = document.getElementById('manual-code');
        const code = codeInput.value.trim().toUpperCase(); 
        const phone = localStorage.getItem('yuyu_phone');
        if(!code) return alert('請先輸入序號喔！');
        await processCollection(phone, code);
        codeInput.value = ''; 
    }

    async function ensureUserExists(phone) {
        try {
            const res = await fetch(`${API_URL}/search?phone=${phone}`);
            const data = await res.json();
            if(data.length === 0) {
                await fetch(API_URL, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": [{"phone": phone, "points": 0, "used_codes": ""}]})
                });
            } else {
                const pts = parseFloat(data[0].points || 0);
                document.getElementById('points-display').innerText = pts;
                if(pts >= 10) document.getElementById('reward-btn').classList.remove('hidden');
            }
            const lineArea = document.getElementById('line-bonus-area');
            const msg = encodeURIComponent(`我的手機帳號是 ${phone}，我已加入好友，我要領取 0.5 點加碼獎勵！`);
            document.getElementById('line-link').href = `https://line.me/R/oaMessage/${LINE_OA_ID}/?${msg}`;
            lineArea.classList.remove('hidden');
        } catch (e) { console.error(e); }
    }

    async function processCollection(phone, manualCode = null) {
        const urlParams = new URLSearchParams(window.location.search);
        const code = manualCode || urlParams.get('code');
        if(!code) return; 

        document.getElementById('msg').innerText = "序號驗證中...";
        try {
            // 1. 搜尋序號
            const codeRes = await fetch(`${API_URL}/search?code=${code}&sheet=${CODE_SHEET}`);
            const codeData = await codeRes.json();
            
            if(codeData.length > 0 && codeData[0].status === 'unused') {
                const pointValue = parseFloat(codeData[0].value || 1); 

                // 2. 搜尋用戶
                const userRes = await fetch(`${API_URL}/search?phone=${phone}`);
                const userData = await userRes.json();
                const newPoints = parseFloat(userData[0].points || 0) + pointValue; 

                // 3. 更新點數
                const patchRes = await fetch(`${API_URL}/phone/${phone}`, {
                    method: 'PATCH', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": {"points": newPoints}})
                });

                if(!patchRes.ok) throw new Error("資料庫更新失敗，請檢查欄位名稱");

                // 4. 標記已使用
                await fetch(`${API_URL}/code/${code}?sheet=${CODE_SHEET}`, {
                    method: 'PATCH', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": {"status": "used"}})
                });

                document.getElementById('points-display').innerText = newPoints;
                document.getElementById('msg').innerText = `🎉 集點成功！已加 ${pointValue} 點`;
                if(!manualCode) window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                document.getElementById('msg').innerText = "❌ 序號無效或已被掃描";
            }
        } catch (e) { 
            alert("⚠️ 錯誤：" + e.message);
            document.getElementById('msg').innerText = "系統繁忙，請稍後再試"; 
        }
    }
</script>
</body>
</html>
